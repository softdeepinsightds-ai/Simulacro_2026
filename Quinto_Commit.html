<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #333; color: white; text-align: center; padding: 1rem; }
        nav { background-color: #f4f4f4; padding: 0.5rem; }
        nav ul { list-style: none; display: flex; justify-content: center; margin: 0; padding: 0; }
        nav li { margin: 0 1rem; }
        main { padding: 2rem; }
        .producto { border: 1px solid #ddd; margin: 1rem 0; padding: 1rem; display: flex; align-items: center; }
        .producto img { width: 100px; height: 100px; margin-right: 1rem; }
        footer { background-color: #333; color: white; text-align: center; padding: 1rem; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Mi Tienda Online</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#productos">Productos</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>
    <main id="productos">
        <h2>Productos Destacados</h2>
        <div class="producto">
            <img src="https://via.placeholder.com/100" alt="Producto 1">
            <div>
                <h3>Producto 1</h3>
                <p>Descripción breve del producto.</p>
                <p>Precio: $10.00</p>
                <button>Agregar al Carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="https://via.placeholder.com/100" alt="Producto 2">
            <div>
                <h3>Producto 2</h3>
                <p>Descripción breve del producto.</p>
                <p>Precio: $15.00</p>
                <button>Agregar al Carrito</button>
            </div>
        </div>
        <!-- Agrega más productos aquí -->
    </main>
    <footer>
        <p>&copy; 2023 Mi Tienda. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
